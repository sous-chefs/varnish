---
name: ci

"on":
  pull_request:
  push:
    branches: [main]

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.1
    permissions:
      checks: write
      pull-requests: write
      statuses: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os:
          - almalinux-8
          - almalinux-9
          - centos-stream-9
          - debian-12
          - oraclelinux-8
          - oraclelinux-9
          - rockylinux-8
          - rockylinux-9
          - ubuntu-2204
          - ubuntu-2404
        suite:
          - "distro"
          - "full-stack"
          - "default"
        exclude:
          - os: almalinux-8
            suite: full-stack
          - os: almalinux-9
            suite: full-stack
          - os: centos-stream-9
            suite: full-stack
          - os: oraclelinux-8
            suite: full-stack
          - os: oraclelinux-9
            suite: full-stack
          - os: rockylinux-8
            suite: full-stack
          - os: rockylinux-9
            suite: full-stack
      fail-fast: false

    steps:
      - name: Check out code
        uses: actions/checkout@v6
      - name: Install Chef
        uses: sous-chefs/.github/.github/actions/install-workstation@8.0.1
      - name: Dokken
        uses: actionshub/test-kitchen@3.0.0
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        with:
          suite: ${{ matrix.suite }}
          os: ${{ matrix.os }}
      - name: Print debug output on failure
        if: failure()
        run: |
          set -x
          sudo journalctl -l --since today
          KITCHEN_LOCAL_YAML=kitchen.dokken.yml /usr/bin/kitchen exec ${{ matrix.suite }}-${{ matrix.os }} -c "journalctl -l"
