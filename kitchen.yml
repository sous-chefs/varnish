---
driver:
  name: vagrant

provisioner:
  name: chef_infra
  product_name: chef
  product_version: latest
  channel: stable
  policyfile: Policyfile.rb
  deprecations_as_errors: true
  enforce_idempotency: true
  multiple_converge: 2
  chef_license: accept

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: centos-stream-9
  - name: debian-12
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: ubuntu-22.04
  - name: ubuntu-24.04

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default

suites:
  - name: default
    provisioner:
      named_run_list: default
    verifier: *default_verifier

  - name: distro
    provisioner:
      named_run_list: distro
    verifier:
      inspec_tests:
        - path: test/integration/default
      inputs:
        ncsa_format_string: true

  - name: full_stack
    provisioner:
      named_run_list: full_stack
    verifier:
      inspec_tests:
        - path: test/integration/default
      inputs:
        full_stack: true
